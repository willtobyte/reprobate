on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      CARIMBO_TAG: "v1.1.3"

    permissions:
      contents: write

    steps:
      - name: Clone the repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get install --yes p7zip-full

      - name: Create bundle
        run: 7z a -xr'!icon.png' -xr'!.git/*' -xr'!.git' -xr'!.*' -t7z -m0=lzma -mx=6 -mfb=64 -md=32m -ms=on bundle.7z .

      - name: Download Carimbo WebAssembly runtime
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release download ${{ env.CARIMBO_TAG }} --repo willtobyte/carimbo --pattern "WebAssembly.zip"

      - name: Extract Carimbo runtime
        run: 7z x WebAssembly.zip -o.

      - name: Copy files
        run: |
          mkdir -p output
          mv bundle.7z output/
          mv carimbo.js output/
          mv carimbo.wasm output/
      - name: Criar arquivo docker-compose.yml localmente
        run: |
          cat << 'EOF' > docker-compose.yml
          services:
            web:
              image: python:3.13-slim
              command: python -m http.server 8000
              restart: unless-stopped
              working_dir: /app
              volumes:
                - ./output:/app

            cloudflare:
              image: cloudflare/cloudflared:latest
              environment:
                - TUNNEL_TOKEN=${CLOUDFLARE_TOKEN}
              command: tunnel --no-autoupdate run
              restart: unless-stopped
          EOF

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.HETZNER_IP }} >> ~/.ssh/known_hosts

      - name: Deploy Docker Compose
        env:
          DOCKER_HOST: ssh://root@${{ secrets.HETZNER_IP }}
          CLOUDFLARE_TOKEN: ${{ secrets.CLOUDFLARE_TOKEN }}
        run: |
          set -e

          docker compose down --remove-orphans
          docker system prune --all --force
          docker compose up --build --force-recreate --detach

          docker ps -a
