name: Publish Google Play

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish:
    runs-on: ubuntu-latest

    env:
      CARIMBO_TAG: "v1.3.31"

    permissions:
      contents: write

    steps:
      - name: Clone the repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install latest Android SDK components
        run: |
          yes | sdkmanager --licenses                         # accept licenses
          LATEST_PLATFORM=$(sdkmanager --list | \
            grep -Eo 'platforms;android-[0-9]+' | sort -t- -k2 -n | tail -n1)

          LATEST_BUILD_TOOLS=$(sdkmanager --list | \
            grep -Eo 'build-tools;[0-9]+\.[0-9]+\.[0-9]+' | sort -t\; -k2 -V | tail -n1)

          sdkmanager "platform-tools" "$LATEST_PLATFORM" "$LATEST_BUILD_TOOLS"


          PLATFORM_DIR="$ANDROID_SDK_ROOT/$LATEST_PLATFORM"
          BUILD_TOOLS_VERSION="${LATEST_BUILD_TOOLS##build-tools;}"
          echo "PLATFORM_DIR=$PLATFORM_DIR" >> "$GITHUB_ENV"
          echo "BUILD_TOOLS_VERSION=$BUILD_TOOLS_VERSION" >> "$GITHUB_ENV"
          echo "$ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS_VERSION" >> "$GITHUB_PATH"

      # - name: Add build-tools & platform to PATH
      #   run: |
      #     BUILD_TOOLS_VERSION=${{ env.LATEST_BUILD_TOOLS#build-tools; }}
      #     PLATFORM_DIR="$ANDROID_SDK_ROOT/${{ env.LATEST_PLATFORM }}"

      #     echo "BUILD_TOOLS_VERSION=$BUILD_TOOLS_VERSION" >> $GITHUB_ENV
      #     echo "$ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS_VERSION" >> $GITHUB_PATH
      #     echo "PLATFORM_DIR=$PLATFORM_DIR" >> $GITHUB_ENV

      - name: Debug android.jar presence
        run: |
          ls -l $ANDROID_SDK_ROOT/platforms/android-36/android.jar

      - name: Enforce fullscreen
        run: |
          sed -i -E 's/^(\s*:with_fullscreen\s*)\(false\)/\1(true)/' scripts/main.lua

      - name: Create bundle
        run: |
          7z a bundle.7z \
            . \
            -xr!icon.png \
            -xr!.git \
            -xr!.* \
            -t7z \
            -m0=lzma2 \
            -mx=2 \
            -mfb=8 \
            -md=32k \
            -ms=off \
            -mmt=off

      - name: Download Carimbo runtime
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download ${{ env.CARIMBO_TAG }} --repo willtobyte/carimbo --pattern "Android.tar.gz"

      - name: Extract Carimbo runtime
        run: |
          tar -xzf Android.tar.gz
          mkdir -p libs/armeabi-v7a
          mv carimbo lib/armeabi-v7a/libmain.so

      - name: Download SDL sources (.java)
        run: |
          curl -L -o SDLAndroid.zip https://github.com/libsdl-org/SDL/archive/refs/heads/main.zip
          unzip -q SDLAndroid.zip "SDL-main/android-project/app/src/main/java/org/libsdl/app/*.java" -d workdir
          mkdir -p src/org/libsdl/app
          mv workdir/SDL-main/android-project/app/src/main/java/org/libsdl/app/*.java src/org/libsdl/app/
          rm -rf workdir SDLAndroid.zip

      - name: Create AndroidManifest.xml
        run: |
          mkdir -p build
          cat <<EOF > build/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="org.example.app"
              android:versionCode="1"
              android:versionName="1.0">
              <uses-sdk android:minSdkVersion="16" android:targetSdkVersion="36" />
              <application android:label="MyApp" android:hasCode="true">
                  <activity android:name="org.libsdl.app.SDLActivity"
                      android:label="MyApp"
                      android:theme="@android:style/Theme.NoTitleBar.Fullscreen"
                      android:configChanges="keyboardHidden|orientation|screenSize"
                      android:launchMode="singleInstance">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Create minimal resource
        run: |
          mkdir -p res/values
          echo '<resources><string name="app_name">Carimbo</string></resources>' > res/values/strings.xml

      - name: Build APK
        run: |
          mkdir -p gen obj assets
          cp bundle.7z assets/

          aapt package -f -m -J gen -M build/AndroidManifest.xml -S res \
                       -I "$PLATFORM_DIR/android.jar"

          javac -bootclasspath "$PLATFORM_DIR/android.jar" \
                -d obj \
                -source 1.8 -target 1.8 \
                gen/org/example/app/R.java \
                $(find src -name '*.java')

          d8 --release \
             --min-api 16 \
             --output . \
             --lib "$PLATFORM_DIR/android.jar" \
             $(find obj -type f -name '*.class')

          aapt package -f -M build/AndroidManifest.xml -S res -A assets \
                       -I "$PLATFORM_DIR/android.jar" \
                       -F app.unaligned.apk

          aapt add app.unaligned.apk classes.dex
          zip -r app.unaligned.apk lib

          apksigner sign --ks my-release-key.jks --ks-key-alias alias_name \
                         --ks-pass pass:password --key-pass pass:password \
                         --out app.apk app.unaligned.apk
