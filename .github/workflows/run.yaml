name: WebAssembly Run

on:
  push:
    branches: [main]

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Clone the repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Install HTTP server
        run: npm install -g http-server

      - name: Enforce non-fullscreen
        run: |
          sed -i -E 's/^(\s*:with_fullscreen\s*)\(true\)/\1(false)/' scripts/main.lua

      - name: Create bundle
        run: |
          find . -name '.*' ! -name '.' ! -name '..' -print
          find . -name '.*' ! -name '.' ! -name '..' -exec rm -rf {} +

          zip -r bundle.zip .

      - name: Download Carimbo WebAssembly runtime
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release download ${{ env.CARIMBO_TAG }} --repo willtobyte/carimbo --pattern "WebAssembly.zip"

      - name: Extract Carimbo runtime
        run: unzip WebAssembly.zip -d .

      - name: Copy files
        run: |
          mkdir -p output
          touch output/favicon.ico
          mv bundle.zip output/
          mv carimbo.js output/
          mv carimbo.wasm output/

      - name: Create HTML index file
        run: |
          cat << EOF > output/index.html
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="UTF-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <meta name="description" content="Play Reprobate">
              <link
                rel="preload"
                href="carimbo.js"
                as="script"
                fetchpriority="high"
              />
              <style>
                *,
                *::before,
                *::after {
                  box-sizing: border-box;
                }

                * {
                  margin: 0;
                }

                html, body {
                  width: 100%;
                  height: 100%;
                  display: flex;
                  justify-content: center;
                  align-items: center;
                }

                .container {
                  width: 100%;
                  height: 100%;
                  display: flex;
                  justify-content: center;
                  align-items: center;
                  position: relative;
                }

                canvas {
                  display: block;
                  width: 100vw;
                  height: calc(100vw * (9 / 16));
                  max-height: 100vh;
                  max-width: calc(100vh * (16 / 9));
                }

                #loading {
                  position: absolute;
                  top: 50%;
                  left: 50%;
                  transform: translate(-50%, -50%);
                  font: 1.25rem sans-serif;
                  color: #666;
                  user-select: none;
                }
              </style>
            </head>

            <body>
              <div class="container">
                <div id="loading">Loading…</div>
                <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>
              </div>

              <script type="module">
                const canvas = document.getElementById("canvas");
                const loading = document.getElementById("loading");

                const promise = fetch("bundle.zip");

                window.Module = {
                  canvas,
                  noInitialRun: true,
                  onRuntimeInitialized: async () => {
                    loading.remove();
                    const response = await promise;
                    const blob = await response.blob();
                    const buffer = await blob.arrayBuffer();
                    FS.writeFile("/bundle.zip", new Uint8Array(buffer));
                    Module.callMain();
                  },
                };

                const script = document.createElement("script");
                script.src = "carimbo.js";
                script.defer = true;
                document.body.appendChild(script);
              </script>
            </body>
          </html>
          EOF

      - name: Run Puppeteer
        run: |
          npx http-server output -p 8080 &
          SERVER_PID=$!
          trap "kill $SERVER_PID" EXIT
          sleep 3
          node -e "
            const path = require('path');
            const puppeteer = require('puppeteer');

            (async () => {
              const browser = await puppeteer.launch({
                headless: 'new',
                args: ['--no-sandbox', '--disable-setuid-sandbox']
              });

              const page = await browser.newPage();

              page.on('console', async (message) => {
                const args = await Promise.all(message.args().map(arg => arg.jsonValue()));
                console.log(...args);

                if (message.type() === 'error') {
                  process.exit(1);
                }
              });

              page.on('pageerror', error => {
                console.error(error.message);
                process.exit(1);
              });

              page.on('error', error => {
                console.error(error.message);
                process.exit(1);
              });

              try {
                await page.goto('http://localhost:8080/index.html', {
                  waitUntil: 'load',
                  timeout: 15000
                });

                await new Promise(resolve => setTimeout(resolve, 10000));

                console.log('WebAssembly loaded without errors for 10 seconds');
              } catch (e) {
                console.error('Failed to load file:', e.message);
                process.exit(1);
              } finally {
                await browser.close();
              }
            })();
          "
