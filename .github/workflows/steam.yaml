name: Publish Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish:
    runs-on: ubuntu-latest

    env:
      CARIMBO_TAG: "v1.2.38"

    permissions:
      contents: write

    steps:
      - name: Clone the repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes luajit p7zip-full

      - name: Enforce fullscreen
        run: |
          sed -i -E 's/^(\s*:with_fullscreen\s*)\(false\)/\1(true)/' scripts/main.lua

      - name: Compile .lua to bytecode
        run: |
          find . -name "*.lua" -type f | while read -r file; do
            luajit -b "$file" "${file%.lua}.luac"
            rm "$file"
          done

      - name: Install cbor2 dependency
        run: pip install cbor2

      - name: Convert JSON to CBOR
        run: |
          python3 - <<EOF
          import json
          import cbor2
          from pathlib import Path

          for path in Path('.').rglob('*.json'):
              with path.open('r', encoding='utf-8') as f:
                  data = json.load(f)
              with path.with_suffix('.cbor').open('wb') as f:
                  cbor2.dump(data, f)
              path.unlink()
          EOF

      - name: Create bundle
        run: |
          7z a bundle.7z \
            . \
            -xr!icon.png \
            -xr!.git \
            -xr!.* \
            -t7z \
            -m0=lzma2 \
            -mx=2 \
            -mfb=8 \
            -md=32k \
            -ms=off \
            -mmt=off

      - name: Download Carimbo runtime
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download ${{ env.CARIMBO_TAG }} --repo willtobyte/carimbo --pattern "Windows.zip"
          gh release download ${{ env.CARIMBO_TAG }} --repo willtobyte/carimbo --pattern "macOS.tar.gz"

      - name: Extract Carimbo runtime
        run: |
          7z x Windows.zip -o.
          tar -xzf macOS.tar.gz

      - name: Create VERSION file
        run: |
          echo "carimbo: $CARIMBO_TAG" > VERSION
          echo "game: ${{ github.ref_name }}" >> VERSION
          echo "https://github.com/willtobyte/carimbo" >> VERSION

      - name: Copy files
        run: |
          chmod -x LICENSES || true
          chmod -x VERSION || true
          mkdir -p output/macos output/windows
          cp bundle.7z output/macos/
          cp bundle.7z output/windows/
          cp carimbo.exe output/windows/
          cp carimbo output/macos/
          cp LICENSES output/windows/
          cp LICENSES output/macos/
          cp VERSION output/windows/
          cp VERSION output/macos/

      - name: Upload build to Steam
        uses: game-ci/steam-deploy@v3
        with:
          username: ${{ secrets.STEAM_USERNAME }}
          configVdf: ${{ secrets.STEAM_CONFIG_VDF }}
          buildDescription: ${{ github.ref_name }}
          appId: ${{ secrets.STEAM_APP_ID }}
          rootPath: output
          depot1Path: windows
          depot2Path: macos
          releaseBranch: alpha
