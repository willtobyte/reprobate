name: Publish Online

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish:
    runs-on: ubuntu-latest

    if: true

    env:
      CARIMBO_TAG: "v1.6.88"

    permissions:
      contents: write

    steps:
      - name: Clone the repository
        uses: actions/checkout@v4

      - name: Enforce non-fullscreen
        run: |
          sed -i -E 's/^(\s*:with_fullscreen\s*)\(true\)/\1(false)/' scripts/main.lua

      - name: Create cartridge
        run: |
          find . -name '.*' ! -name '.' ! -name '..' -print
          find . -name '.*' ! -name '.' ! -name '..' -exec rm -rf {} +

          zip -r cartridge.zip .

      - name: Download Carimbo WebAssembly runtime
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release download ${{ env.CARIMBO_TAG }} --repo willtobyte/carimbo --pattern "WebAssembly.zip"

      - name: Extract Carimbo runtime
        run: unzip WebAssembly.zip -d .

      - name: Copy files
        run: |
          mkdir -p output
          touch output/favicon.ico
          mv cartridge.zip output/
          mv carimbo.js output/
          mv carimbo.wasm output/

      - name: Create _headers file
        run: |
          cat << EOF > output/_headers
          /index.html
            Cache-Control: max-age=0, must-revalidate

          /carimbo.js
            Cache-Control: public, max-age=31536000, immutable

          /carimbo.wasm
            Cache-Control: public, max-age=31536000, immutable

          /cartridge.zip
            Cache-Control: public, max-age=31536000, immutable
          EOF

      - name: Set current tag
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "GIT_TAG=$TAG" >> $GITHUB_ENV

      - name: Create HTML index file
        run: |
          cat << EOF > output/index.html
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="UTF-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <meta name="description" content="I am the Reprobate one">
              <link
                rel="preload"
                href="carimbo.js?v=${GIT_TAG}"
                as="script"
                fetchpriority="high"
              />
              <style>
                *,
                *::before,
                *::after {
                  box-sizing: border-box;
                }

                * {
                  margin: 0;
                }

                html, body {
                  width: 100%;
                  height: 100%;
                  display: flex;
                  justify-content: center;
                  align-items: center;
                }

                .container {
                  width: 100%;
                  height: 100%;
                  display: flex;
                  justify-content: center;
                  align-items: center;
                  position: relative;
                }

                canvas {
                  display: block;
                  width: 100vw;
                  height: calc(100vw * (9 / 16));
                  max-height: 100vh;
                  max-width: calc(100vh * (16 / 9));
                }

                #loading {
                  position: absolute;
                  top: 50%;
                  left: 50%;
                  transform: translate(-50%, -50%);
                  font: 1.25rem sans-serif;
                  color: #666;
                  user-select: none;
                }
              </style>
            </head>

            <body>
              <div class="container">
                <div id="loading">Loading…</div>
                <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>
              </div>

              <script>
                console.log("Game: ${GIT_TAG}");

                const download = fetch("cartridge.zip?v=${GIT_TAG}")
                  .then(res => res.blob())
                  .then(blob => blob.arrayBuffer());

                window.Module = {
                  canvas: document.getElementById("canvas"),
                  noInitialRun: true,
                  locateFile: (path) => path.endsWith(".wasm") ? path + "?v=${GIT_TAG}" : path,
                  onRuntimeInitialized: async () => {
                    const buffer = await download;
                    FS.writeFile("/cartridge.zip", new Uint8Array(buffer));
                    document.getElementById("loading").remove();
                    Module.callMain();
                  },
                };

                const script = document.createElement("script");
                script.src = "carimbo.js?v=${GIT_TAG}";
                document.body.appendChild(script);
              </script>
            </body>
          </html>
          EOF

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ./output --branch=main --project-name=${{ secrets.CLOUDFLARE_PAGES_PROJECT }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Purge Cloudflare Cache
        env:
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          curl -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
                -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
                -H "Content-Type: application/json" \
                --data '{"purge_everything":true}'
